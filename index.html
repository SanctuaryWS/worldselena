  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #050507;
      color: #ffffff;
      padding: 18px;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #9fb0ff;
      box-shadow: 0 0 18px rgba(159,176,255,.6);
      background: #111;
      flex: 0 0 auto;
    }

    .site-title h1 {
      font-size: 30px;
      line-height: 1;
    }

    .site-title p {
      color: #aaaec4;
      margin-top: 6px;
      font-size: 14px;
    }

    .search-row {
      display: flex;
      margin-bottom: 16px;
    }

    .search-row input {
      flex: 1;
      padding: 15px 18px;
      border-radius: 24px;
      border: none;
      outline: none;
      background: #191b2f;
      color: white;
      font-size: 16px;
    }

    /* Верхнее меню: гибкое, без прокрутки, компактное */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 14px;
      overflow: visible;
      white-space: normal;
      margin-bottom: 6px;
      padding-bottom: 0;
    }

    .tab {
      flex: 0 0 auto;
      background: none;
      border: none;
      color: #85899e;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
      cursor: pointer;
      padding: 4px 0 6px;
      white-space: nowrap;
    }

    .tab.active {
      color: white;
      border-bottom: 3px solid white;
    }

    .filter-line {
      min-height: 0;
      margin-bottom: 10px;
      color: #aaaec4;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-line:empty {
      display: none;
      margin: 0;
    }

    .active-filter {
      background: linear-gradient(135deg, #4051a8, #2b8f77);
      color: white;
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: bold;
      font-size: 13px;
    }

    .reset-filter {
      background: #2a2d42;
      color: #ffadc9;
      border: 1px solid #4b506f;
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }

    .history {
      background: #202131;
      border-radius: 18px;
      padding: 16px;
      margin-top: 12px;
      margin-bottom: 18px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .history h2,
    .results-title {
      font-size: 20px;
      font-weight: 600;
      color: #e6e8f5;
      letter-spacing: 0.2px;
    }

    .history button {
      background: none;
      border: none;
      color: #ffadc9;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
    }

    .history p,
    .counter {
      color: #8f93a8;
      font-size: 13px;
    }

    .results-title {
      margin-bottom: 8px;
    }

    .counter {
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .card {
      background: #202131;
      border: 1px solid #313653;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0,0,0,.25);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .cover-wrap {
      position: relative;
      aspect-ratio: 2 / 3;
      background: linear-gradient(135deg,#2d335d,#12131d);
      overflow: hidden;
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      background: rgba(45,122,86,.92);
      color: white;
      z-index: 2;
    }

    .card-content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .book-title {
      font-size: 13px;
      line-height: 1.2;
      min-height: 44px;
      max-height: 44px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    /* Теги гибкие: если тегов нет — место исчезает */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 0;
      height: auto;
      max-height: 54px;
      overflow: hidden;
      margin: 0 0 10px 0;
      align-content: flex-start;
    }

    .tags:empty {
      display: none;
      min-height: 0;
      height: 0;
      max-height: 0;
      margin: 0;
      padding: 0;
    }

    .tag {
      border: none;
      border-radius: 8px;
      background: #4a4d58;
      color: #f2f2f2;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag:hover {
      background: #626672;
    }

    .tag.active-tag {
      background: linear-gradient(135deg, #5869d8, #2baf8c);
      color: white;
      box-shadow: 0 0 10px rgba(88,105,216,.55);
    }

    .links {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-top: auto;
    }

    .links a {
      text-decoration: none;
      text-align: center;
      color: white;
      border: 1px solid #58618d;
      border-radius: 10px;
      padding: 8px 6px;
      font-size: 13px;
      font-weight: bold;
      background: #242846;
    }

    .links a:hover {
      background: #32385f;
    }

    .empty {
      color: #aaaec4;
      padding: 24px;
      background: #202131;
      border-radius: 18px;
      display: none;
    }

    /* Окно фильтров */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 50;
      display: none;
      align-items: flex-end;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .category-sheet {
      width: 100%;
      max-width: 900px;
      max-height: 88vh;
      overflow-y: auto;
      margin: 0 auto;
      background: rgba(42, 43, 55, .97);
      border-radius: 26px 26px 0 0;
      padding: 18px 14px 16px;
      box-shadow: 0 -10px 35px rgba(0,0,0,.45);
      animation: sheetUp .22s ease-out;
    }

    @keyframes sheetUp {
      from {
        transform: translateY(100%);
        opacity: .5;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .sheet-title {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .sheet-section-title {
      color: #b9bdcf;
      font-size: 13px;
      margin: 12px 0 8px;
      font-weight: bold;
    }

    .sheet-options {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .sheet-chip {
      border: none;
      border-radius: 999px;
      background: #777b82;
      color: #fff;
      padding: 8px 11px;
      font-size: 12px;
      line-height: 1.1;
      font-weight: bold;
      cursor: pointer;
      max-width: 100%;
    }

    .sheet-chip.selected {
      background: linear-gradient(135deg, #ff3c96, #ff1c7b);
      box-shadow: 0 0 16px rgba(255, 60, 150, .65);
    }

    .sheet-actions {
      position: sticky;
      bottom: -16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 16px;
      padding-top: 14px;
      background: linear-gradient(to top, rgba(42,43,55,1), rgba(42,43,55,.95));
    }

    .sheet-actions button {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .sheet-reset {
      background: #8b8e93;
    }

    .sheet-confirm {
      background: linear-gradient(135deg, #ff3c96, #ff1c7b);
      box-shadow: 0 0 16px rgba(255, 60, 150, .55);
    }

    @media (max-width: 560px) {
      body {
        padding: 12px;
      }

      header {
        gap: 12px;
        margin-bottom: 20px;
      }

      .logo {
        width: 60px;
        height: 60px;
      }

      .site-title h1 {
        font-size: 25px;
      }

      .search-row {
        margin-bottom: 14px;
      }

      .tabs {
        gap: 5px 11px;
        margin-bottom: 4px;
        padding-bottom: 0;
      }

      .tab {
        font-size: 12px;
        padding: 3px 0 5px;
      }

      .history {
        margin-top: 10px;
        margin-bottom: 16px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
      }

      .book-title {
        font-size: 12px;
        min-height: 42px;
        max-height: 42px;
      }

      .tags {
        max-height: 50px;
        margin-bottom: 8px;
      }

      .tag {
        font-size: 11px;
        padding: 5px 7px;
      }

      .links {
        gap: 6px;
      }

      .links a {
        font-size: 12px;
        padding: 7px 5px;
      }

      .status-badge {
        font-size: 10px;
        padding: 5px 7px;
      }

      .category-sheet {
        max-height: 82vh;
        border-radius: 22px 22px 0 0;
      }

      .sheet-chip {
        font-size: 11px;
        padding: 7px 10px;
      }

      .sheet-options {
        gap: 6px;
      }

      .sheet-title {
        font-size: 20px;
      }

      .sheet-actions {
        gap: 10px;
      }
    }
  </style>

</head>

    <h2 class="results-title">Результаты</h2>

    <main class="grid" id="bookGrid"></main>

  </div>

  <div class="modal-backdrop" id="filterBackdrop">
    <div class="category-sheet">

        <button class="sheet-reset" id="sheetReset">Сбросить</button>
        <button class="sheet-confirm" id="sheetConfirm">Подтвердить</button>
      </div>
    </div>
  </div>

    const searchInput = document.getElementById("searchInput");
    const bookGrid = document.getElementById("bookGrid");

    const sheetCategories = document.getElementById("sheetCategories");

    const openMenuButtons = document.querySelectorAll(".menu-tab");
    const homeButton = document.getElementById("homeButton");
    const sheetResetBtn = document.getElementById("sheetReset");
    const sheetConfirmBtn = document.getElementById("sheetConfirm");

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase().replaceAll("ё", "е");
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function getAuthor(book) {
      return book.author || String(book.title || "").split(" / ")[0].trim() || "Без автора";
    }

    function getBookGenres(book) {
      if (!Array.isArray(book.genres)) return [];

      return book.genres.map(genre => {
        if (normalizeText(genre) === "городское") return "Городское фэнтези";
        return genre;
      });
    }

    function getBookSeriesItems(book) {
      const items = [];
      if (book.series) items.push(book.series);
      if (book.subseries) items.push(book.subseries);
      if (Array.isArray(book.arcs)) items.push(...book.arcs);
      if (book.standalone) items.push("Одиночные романы");
      return items.filter(Boolean);
    }

    function getAllAuthors() {
      return [...new Set(books.map(getAuthor))].sort((a, b) => a.localeCompare(b, "ru"));
    }

    function getAllSeries() {
      return [...new Set(books.flatMap(getBookSeriesItems))]
        .sort((a, b) => a.localeCompare(b, "ru"));
    }

    function getAllTags() {
      return [...new Set(books.flatMap(book => book.tags || []))]
        .sort((a, b) => a.localeCompare(b, "ru"));
    }

    function getHistory() {
      return JSON.parse(localStorage.getItem("bookHistory") || "[]");
    }

    function saveToHistory(title) {
      let history = getHistory();
      history = history.filter(item => item !== title);
      history.unshift(title);
      history = history.slice(0, 5);
      localStorage.setItem("bookHistory", JSON.stringify(history));
      renderHistory();
    }

    function renderHistory() {
      const history = getHistory();
      historyText.textContent = history.length ? history.join(" • ") : "История пока пуста.";
    }

    function clearAllFilters() {
      currentGenre = null;
      currentAuthor = null;
      currentSeries = null;
      currentStandalone = null;
      currentTag = null;
      searchInput.value = "";
      renderBooks();
      updateTopMenuActive();
    }

    function updateTopMenuActive() {
      homeButton.classList.toggle("active", !currentGenre && !currentAuthor && !currentSeries && !currentTag);
      openMenuButtons.forEach(button => {
        const type = button.dataset.menu;
        button.classList.toggle(
          "active",
          (type === "genre" && currentGenre) ||
          (type === "author" && currentAuthor) ||
          (type === "series" && currentSeries) ||
          (type === "standalone" && currentStandalone) ||
          (type === "tag" && currentTag)
        );
      });
    }

    function openFilterSheet(type) {
      tempMenuType = type;

      if (type === "genre") {
        tempValue = currentGenre;
        sheetTitle.textContent = "Жанры";

      if (type === "author") {

      if (type === "tag") {

      }

      renderSheetOptions();

    }

    function closeFilterSheet() {
      filterBackdrop.classList.remove("open");

    function getOptionsByMenuType(type) {
      if (type === "genre") return FIXED_CATEGORIES;
      if (type === "author") return getAllAuthors().map(author => ({ label: author, value: author }));
      if (type === "series") return getAllSeries().map(series => ({ label: series, value: series }));

      if (type === "standalone") {
        return [
          { label: "Современные романы", value: "Современные романы" },
          { label: "Исторические романы", value: "Исторические романы" },

          { label: "Рассказы", value: "Рассказы" }

      }

      if (type === "tag") return getAllTags().map(tag => ({ label: tag, value: tag }));

    function renderSheetOptions() {
      const options = getOptionsByMenuType(tempMenuType);

        const button = document.createElement("button");

                normalizeText(currentStandalone) === "сказки" &&
                standaloneGenres.includes("сказка")
              ) ||

              (
                normalizeText(currentStandalone) === "романтика" &&
                standaloneGenres.includes("романтика")
              ) ||

              (
                normalizeText(currentStandalone) === "эротика" &&
                (
                  standaloneGenres.includes("эротика") ||
                  standaloneTags.includes("эротика")
                )
              ) ||

              (
                normalizeText(currentStandalone) === "рассказы" &&
                (
                  standaloneGenres.includes("рассказы") ||
                  standaloneTags.includes("рассказы")
                )
              )
            )
          );

        const matchesTag = !currentTag || (book.tags || []).some(tag => normalizeText(tag) === normalizeText(currentTag));

        return matchesSearch && matchesGenre && matchesAuthor && matchesSeries && matchesStandalone && matchesTag;
      });

      bookGrid.innerHTML = "";
      counter.textContent = `Показано ${filtered.length} из ${books.length} • Всего в каталоге ${books.length}`;
      emptyMessage.style.display = filtered.length ? "none" : "block";
      renderFilterLine();

      filtered.forEach(book => {
        const card = document.createElement("article");
        card.className = "card";

        const tagsHTML = (book.tags || []).map(tag => `
          <button class="tag ${currentTag === tag ? "active-tag" : ""}" data-tag="${escapeHTML(tag)}">${escapeHTML(tag)}</button>
        `).join("");

        card.innerHTML = `
          <div class="cover-wrap">
            <span class="status-badge">${escapeHTML(book.status)}</span>
            <img src="${escapeHTML(book.cover)}" alt="${escapeHTML(book.title)}" />
          </div>
          <div class="card-content">
            <h3 class="book-title">${escapeHTML(book.title)}</h3>
            <div class="tags">${tagsHTML}</div>
            <div class="links">
              <a href="${escapeHTML(book.annotation)}" target="_blank">Аннотация</a>
              <a href="${escapeHTML(book.read)}" target="_blank">Читать</a>
            </div>
          </div>
        `;

        card.querySelectorAll(".tag").forEach(button => {
          button.addEventListener("click", () => {
            applyFilter("tag", button.dataset.tag);
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        });

        card.querySelector(".links a:last-child").addEventListener("click", () => saveToHistory(book.title));

        bookGrid.appendChild(card);
      });
    }

    homeButton.addEventListener("click", clearAllFilters);

    openMenuButtons.forEach(button => {
      button.addEventListener("click", () => openFilterSheet(button.dataset.menu));
    });

    searchInput.addEventListener("input", renderBooks);

    document.getElementById("clearHistory").addEventListener("click", () => {
      localStorage.removeItem("bookHistory");
      renderHistory();
    });

    filterBackdrop.addEventListener("click", (event) => {
      if (event.target === filterBackdrop) closeFilterSheet();
    });

    sheetResetBtn.addEventListener("click", () => {
      tempValue = null;
      renderSheetOptions();
    });

    sheetConfirmBtn.addEventListener("click", () => {
      applyFilter(tempMenuType, tempValue);
      closeFilterSheet();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    updateTopMenuActive();
    renderHistory();
    renderBooks();

  </script>
</body>
</html>
