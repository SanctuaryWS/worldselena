      margin-top: 6px;

    }

      display: flex;
      margin-bottom: 16px;
    }

    .search-row input {

      padding: 15px 18px;
      border-radius: 24px;
      border: none;
      outline: none;
      background: #191b2f;
      color: white;
      font-size: 16px;

    /* Верхнее меню: гибкое, без прокрутки, компактное */
    .tabs {

      flex-wrap: wrap;
      align-items: center;
      gap: 6px 14px;
      overflow: visible;
      white-space: normal;
      margin-bottom: 6px;

    .tab {

      border: none;
      color: #85899e;

      font-weight: 600;
      line-height: 1.2;
      cursor: pointer;

    .filter-line {

      margin-bottom: 10px;
      color: #aaaec4;

      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-line:empty {
      display: none;
      margin: 0;
    }

    .active-filter {
      background: linear-gradient(135deg, #4051a8, #2b8f77);
      color: white;
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: bold;
      font-size: 13px;
    }

    .reset-filter {
      background: #2a2d42;
      color: #ffadc9;
      border: 1px solid #4b506f;
      border-radius: 999px;
      padding: 7px 12px;
      font-weight: bold;
      cursor: pointer;
      font-size: 13px;
    }

    .history {
      background: #202131;
      border-radius: 18px;
      padding: 16px;
      margin-top: 12px;
      margin-bottom: 18px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .history h2,

      font-size: 20px;
      font-weight: 600;
      color: #e6e8f5;
      letter-spacing: 0.2px;
    }

    .history button {
      background: none;
      border: none;
      color: #ffadc9;
      font-weight: bold;
      font-size: 13px;
      cursor: pointer;
    }

    .history p,
    .counter {
      color: #8f93a8;
      font-size: 13px;
    }

    .results-title {
      margin-bottom: 8px;
    }

    .counter {
      margin-bottom: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      align-items: stretch;
    }

    .card {
      background: #202131;
      border: 1px solid #313653;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0,0,0,.25);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .cover-wrap {
      position: relative;
      aspect-ratio: 2 / 3;
      background: linear-gradient(135deg,#2d335d,#12131d);
      overflow: hidden;
    }

    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      background: rgba(45,122,86,.92);
      color: white;
      z-index: 2;
    }

    .card-content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .book-title {
      font-size: 13px;
      line-height: 1.2;
      min-height: 44px;
      max-height: 44px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    /* Теги гибкие: если тегов нет — место исчезает */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 0;
      height: auto;
      max-height: 54px;
      overflow: hidden;
      margin: 0 0 10px 0;
      align-content: flex-start;
    }

    .tags:empty {
      display: none;
      min-height: 0;
      height: 0;
      max-height: 0;
      margin: 0;
      padding: 0;
    }

    .tag {
      border: none;
      border-radius: 8px;
      background: #4a4d58;
      color: #f2f2f2;
      padding: 5px 9px;
      font-size: 12px;
      cursor: pointer;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag:hover {
      background: #626672;
    }

    .tag.active-tag {
      background: linear-gradient(135deg, #5869d8, #2baf8c);
      color: white;
      box-shadow: 0 0 10px rgba(88,105,216,.55);
    }

    .links {
      display: grid;
      grid-template-columns: 1fr;
      gap: 7px;
      margin-top: auto;
    }

    .links a {
      text-decoration: none;
      text-align: center;
      color: white;
      border: 1px solid #58618d;
      border-radius: 10px;
      padding: 8px 6px;
      font-size: 13px;
      font-weight: bold;
      background: #242846;
    }

    .links a:hover {
      background: #32385f;
    }

    .empty {
      color: #aaaec4;
      padding: 24px;
      background: #202131;
      border-radius: 18px;
      display: none;
    }

    /* Окно фильтров */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      z-index: 50;
      display: none;
      align-items: flex-end;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .category-sheet {
      width: 100%;
      max-width: 900px;
      max-height: 88vh;
      overflow-y: auto;
      margin: 0 auto;
      background: rgba(42, 43, 55, .97);
      border-radius: 26px 26px 0 0;
      padding: 18px 14px 16px;
      box-shadow: 0 -10px 35px rgba(0,0,0,.45);
      animation: sheetUp .22s ease-out;
    }

    @keyframes sheetUp {
      from {
        transform: translateY(100%);
        opacity: .5;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .sheet-title {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .sheet-section-title {
      color: #b9bdcf;
      font-size: 13px;
      margin: 12px 0 8px;
      font-weight: bold;
    }

    .sheet-options {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .sheet-chip {
      border: none;
      border-radius: 999px;
      background: #777b82;
      color: #fff;
      padding: 8px 11px;
      font-size: 12px;
      line-height: 1.1;
      font-weight: bold;
      cursor: pointer;
      max-width: 100%;
    }

    .sheet-chip.selected {
      background: linear-gradient(135deg, #ff3c96, #ff1c7b);
      box-shadow: 0 0 16px rgba(255, 60, 150, .65);
    }

    .sheet-actions {
      position: sticky;
      bottom: -16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 16px;
      padding-top: 14px;
      background: linear-gradient(to top, rgba(42,43,55,1), rgba(42,43,55,.95));
    }

    .sheet-actions button {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }

    .sheet-reset {
      background: #8b8e93;
    }

    .sheet-confirm {
      background: linear-gradient(135deg, #ff3c96, #ff1c7b);
      box-shadow: 0 0 16px rgba(255, 60, 150, .55);
    }

        margin-bottom: 14px;

        font-size: 20px;

    .annotation-text {

    .annotation-text b,

      font-weight: 700;
      color: #ffffff;
    }

    .annotation-text i,
    .annotation-text em {
      font-style: italic;
    }

    .annotation-text u {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .annotation-actions {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .annotation-read {
      text-decoration: none;
      text-align: center;
      color: white;
      border: 1px solid #58618d;
      border-radius: 12px;

      font-weight: bold;
      background: #242846;

      font-size: 13px;
      font-weight: bold;
      background: #242846;

      background: #32385f;

        padding: 0;

      .annotation-modal {
        max-height: 86vh;

        padding: 16px;
      }

      .annotation-title {

      }

      .annotation-text {

      }

  </style>

</head>
<body>
  <div class="app">
    <header>
      <img class="logo" src="https://i.ibb.co/d0jjvDWf/logo.jpg" alt="Sanctuary logo">
      <div class="site-title">
        <h1>Sanctuary</h1>
        <p>Каталог книг и серий</p>
      </div>
    </header>

    <div class="search-row">
      <input id="searchInput" type="text" placeholder="Введите название книги" />
    </div>

    <nav class="tabs" id="tabs">
      <button class="tab active" id="homeButton">Главная</button>
      <button class="tab menu-tab" data-menu="genre">Жанры ▼</button>
      <button class="tab menu-tab" data-menu="author">Авторы ▼</button>
      <button class="tab menu-tab" data-menu="series">Серии ▼</button>
      <button class="tab menu-tab" data-menu="standalone">Однотомники ▼</button>
      <button class="tab menu-tab" data-menu="tag">Подборки ▼</button>
    </nav>

    <div class="filter-line" id="filterLine"></div>

    <section class="history">

    <h2 class="results-title">Результаты</h2>

    <main class="grid" id="bookGrid"></main>

  </div>

  <div class="modal-backdrop" id="filterBackdrop">
    <div class="category-sheet">

      <div class="sheet-options" id="sheetTags" style="display:none;"></div>

      <div class="sheet-actions">
        <button class="sheet-reset" id="sheetReset">Сбросить</button>
        <button class="sheet-confirm" id="sheetConfirm">Подтвердить</button>
      </div>
    </div>
  </div>

  <div class="annotation-backdrop" id="annotationBackdrop">

      <div class="annotation-actions">

      </div>
    </div>

  description: "Лучший день в его жизни обернётся для неё сущим кошмаром.\n\nЕщё с колледжа Марко Доусон видел в Белле только друга. В день своей свадьбы он вспоминал о ней лишь из праздного любопытства. Марко не мог понять, почему подружка невесты не явилась на венчание. В конце концов, его молодая жена и Изабелла были соседками по комнате.\n\nПрошло семь лет, и Белла узнает, что Марко недавно развелся и планирует с семьей отдохнуть на элитном курорте Канкуна. Изабелла не желает второй раз упускать свое счастье из рук, поэтому отправляется на курорт, планируя «случайно» столкнуться с Марко и разжечь в его душе искру любви.\n\nПроблема в том, что Белла не учла одного: Финна Доусона — красивого, обаятельного, брата-близнеца Марко, который хочет помирить бывших супругов и ради этого собирается поломать все планы очаровательной мисс Линд.\n\n<b>Примечание:</b> Вдохновением для написания этой романтической истории стали два фильма: «Сабрина» и «Пока ты спал».",

  description: "<b><i>Любовь, что сильнее времени и не подвластна проклятию.</i></b>\n\nНам с Киараном было всего по двенадцать, когда я вытащила его из ледяных вод ручья за своим домом. Когда он повернул голову в мою сторону — с этими невидящими, лавандовыми глазами — я сразу поняла: наш возраст, пожалуй, единственное, что нас связывает.\n\nОн говорил с акцентом, у него были заострённые уши, а ещё — он был так красив, что у меня защемило сердце.\n\nОн утверждал, что является принцем фейри, проклятым ведьмами, которые лишили его зрения.\n\nТогда я подумала, что он сошёл с ума от холода. Но оказалось — вовсе нет. И по какой-то странной причине он продолжал возвращаться.\n\nПроблема лишь в том, что один день в моём мире равен целому году в его. Каждый раз, когда я вижу Киарана, он становится старше. Мудрее. И… ещё прекраснее.\n\nПоследние шесть лет я изо всех сил стараюсь не влюбляться в него, ведь условия проклятия просты: если он не дождётся своей истинной пары всеми возможными способами — включая поцелуй, будь он невинным… или не совсем, — он останется слеп навеки.\n\nПоэтому, когда Киаран целует меня и уносит сквозь портал в своё царство, я ставлю перед собой цель — хоть как-то всё исправить.\n\nБыло бы куда проще, если бы он не был так решительно настроен жениться на мне… и если бы кто-то не пытался убить меня на каждом шагу.\n\n<b><i>Между Рассветом и Закатом рождается история, которую невозможно забыть.</i></b>",

  description: "<i>С первым появлением на страницах книг Сими завоевала сердца читателей. На протяжении более двух десятилетий поклонники серии просили Шеррилин Кеньон историю о демоне Ашерона. И теперь они узнают всю правду...</i>\n\nКак видно, никому из нас жизнь легко не даётся. Особенно, демонице. Осиротев в детстве, Сими вынуждена искать свой путь в царстве смертных. Связанная с богом Атлантиды, невольно ставшим причиной смерти её матери, Сими всю свою жизнь пытается разобраться в столь непонятном для неё мире.\n\nОднако в борьбе богов за власть демонам, тёмным охотникам и людям придётся принять чью-либо сторону, и Сими больше не может полагаться на защиту Ашерона. Она должна найти свой собственный путь. Не только ради себя, но и ради своих близких и друзей.\n\nЛишь одно существо знает секрет спасения жизни Ашерона. Но цена непомерно высока: отдать себя на милость существа, известного своей жестокостью. Казалось бы, лёгкий выбор. Спасти Ашерона во что бы то ни стало. Тем не менее, иногда нужно отступить, ведь, спасая Ашерона, Сими может погибнуть.",

  description: "<b><i>Любовь  — величайший из всех дар и проклятий.</i></b>\n\nДобро пожаловать в чарующий мир Валоры — землю, где Рассвет и Закат делят небо и судьбы.\n\nЗдесь, в Царствах Дня, Ночи и Снов, переплетённых магией и древними тайнами, властвуют фейри.\n\nНо власть развращает, а алчность нередко приводит к ужасающим последствиям. И, как всегда, за грехи родителей расплачиваются дети\n\nКогда-то акт насилия над ковеном ведьм обернулся проклятием: трое наследных принцев — Киаран, Дэймон и Зандер — потеряли зрение.Тьма навеки затмила их глаза.. Но пророчество гласит: лишь истинная любовь способна вернуть зрение и разрушить древнее заклятие.\n\nА ведь именно взгляд — ключ к узнаванию второй половинки. По первому прикосновению взглядов фейри узнают своих суженых, предназначенных самой судьбой. И потому слепота стала для проклятых принцев не просто наказанием, а самой изощрённой формой жестокости.\n\nПрошли века. Принцы стали королями, но вера и надежда не угасли в их сердцах.Слепые, но не сломленные, они готовы пройти через боль, испытания и саму судьбу — чтобы не только преодолеть проклятие, но и положить конец вечной вражде между своими королевствами.\n\nТак начинается сага о любви, искуплении и исцелении — о свете, что рождается во тьме, и о душах, что находят друг друга между Рассветом и Закатом.\n\n<b><i>Между Рассветом и Закатом рождается история, которую невозможно забыть.</i></b>",  annotation: "https://t.me/kalosis/240/242",

  description: "В каждой семье есть свои секреты — и голливудская, оскароносная династия Стоун не исключение.\n\nДжулия Стоун, в отличие от блистательных родственников, выбрала жизнь за кулисами: тихую, но престижную работу в одном из десяти лучших агентств по поиску талантов в Чикаго.\n\nВсё идёт по плану, пока накануне Рождества — праздника, который она клятвенно пообещала провести с роднёй — её не бросает парень. Теперь Джулии предстоит не только встретиться с осуждающими взглядами семьи, но и срочно придумать, как спасти своё лицо.\n\nИ тут на сцену выходит Кэйден Рис.\nПаршивая овца в своей семье врачей и юристов, единственный актёр без карьеры и признания. Уставший от неудач и постоянного разочарования отца, он мечтает о шансе доказать, что способен на большее.\n\nКогда судьба подбрасывает ему встречу с Джулии и возможность подписать контракт с известным агентством «Уолтер и Джек», Кэйден хватается за неё обеими руками. А когда Джулия — в слезах и отчаянии — предлагает приличный гонорар за то, чтобы он сыграл её бойфренда на рождественской неделе, он не может отказаться. Ведь наконец-то можно будет сказать близким: «Да, у меня есть роль».\n\nНо чем больше они притворяются, тем сложнее отличить игру от реальности. И вскоре Кэйден и Джулия поймут три простых истины:\n• У каждой семьи есть свои тайны.\n• Иногда, играя влюблённых, действительно влюбляешься.\n• А омела — лучший друг всякой романтической катастрофы.\n\nВ эти праздничные дни присоединяйтесь к двум фальшивым влюблённым, которым предстоит исполнить главную роль своей жизни.",

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase().replaceAll("ё", "е");
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatDescription(value) {
      let text = escapeHTML(value || "Аннотация пока не добавлена.");

      const allowedTags = ["b", "strong", "i", "em", "u"];
      allowedTags.forEach(tag => {
        text = text.replaceAll(`&lt;${tag}&gt;`, `<${tag}>`);
        text = text.replaceAll(`&lt;/${tag}&gt;`, `</${tag}>`);
      });

      text = text
        .replaceAll("&lt;br&gt;", "<br>")
        .replaceAll("&lt;br/&gt;", "<br>")
        .replaceAll("&lt;br /&gt;", "<br>");

      return text;
    }

    function getAuthor(book) {
      return book.author || String(book.title || "").split(" / ")[0].trim() || "Без автора";
    }

    function getBookGenres(book) {
      if (!Array.isArray(book.genres)) return [];

      return book.genres.map(genre => {
        if (normalizeText(genre) === "городское") return "Городское фэнтези";
        return genre;
      });
    }

    function getBookSeriesItems(book) {
      const items = [];
      if (book.series) items.push(book.series);
      if (book.subseries) items.push(book.subseries);
      if (Array.isArray(book.arcs)) items.push(...book.arcs);
      if (book.standalone) items.push("Одиночные романы");
      return items.filter(Boolean);
    }

    function getAllAuthors() {

        .sort((a, b) => a.localeCompare(b, "ru"));

        const matchesGenre =
          !currentGenre ||
          genres.some(genre => normalizeText(genre) === normalizeText(currentGenre)) ||
          (
            normalizeText(currentGenre) === "рассказы" &&
            (book.tags || []).some(tag => normalizeText(tag) === "рассказы")
          ) ||
          (
            normalizeText(currentGenre) === "эротика" &&
            (book.tags || []).some(tag => normalizeText(tag) === "эротика")
          );
        const matchesAuthor = !currentAuthor || normalizeText(author) === normalizeText(currentAuthor);
        const matchesSeries = !currentSeries || seriesItems.some(item => normalizeText(item) === normalizeText(currentSeries));
        const standaloneGenres = genres.map(g => normalizeText(g));
        const standaloneTags = (book.tags || []).map(t => normalizeText(t));

        const matchesStandalone =
          !currentStandalone ||
          (
            book.standalone &&
            (
              (normalizeText(currentStandalone) === "фэнтези" &&
                standaloneGenres.includes("фэнтези")) ||

              (normalizeText(currentStandalone) === "фантастика" &&
                standaloneGenres.includes("фантастика")) ||

              (normalizeText(currentStandalone) === "современные романы" &&
                standaloneGenres.includes("современный роман")) ||

              (normalizeText(currentStandalone) === "исторические романы" &&
                standaloneGenres.includes("исторический роман")) ||

              (
                (normalizeText(currentStandalone) === "городское фэнтези" ||
                 normalizeText(currentStandalone) === "городское") &&
                (
                  standaloneGenres.includes("городское фэнтези") ||
                  standaloneGenres.includes("городское")
                )
              ) ||

              (normalizeText(currentStandalone) === "мистика" &&
                standaloneGenres.includes("мистика")) ||

              (normalizeText(currentStandalone) === "детектив" &&
                standaloneGenres.includes("детектив")) ||

              (normalizeText(currentStandalone) === "драма" &&
                standaloneGenres.includes("драма")) ||

              (
                normalizeText(currentStandalone) === "сказки" &&
                standaloneGenres.includes("сказка")
              ) ||

              (
                normalizeText(currentStandalone) === "романтика" &&
                standaloneGenres.includes("романтика")
              ) ||

              (
                normalizeText(currentStandalone) === "эротика" &&
                (
                  standaloneGenres.includes("эротика") ||
                  standaloneTags.includes("эротика")
                )
              ) ||

              (
                normalizeText(currentStandalone) === "рассказы" &&
                (
                  standaloneGenres.includes("рассказы") ||
                  standaloneTags.includes("рассказы")
                )
              )
            )
          );

        const matchesTag = !currentTag || (book.tags || []).some(tag => normalizeText(tag) === normalizeText(currentTag));

        return matchesSearch && matchesGenre && matchesAuthor && matchesSeries && matchesStandalone && matchesTag;
      });

      bookGrid.innerHTML = "";
      counter.textContent = `Показано ${filtered.length} из ${books.length} • Всего в каталоге ${books.length}`;
      emptyMessage.style.display = filtered.length ? "none" : "block";
      renderFilterLine();

      filtered.forEach(book => {
        const card = document.createElement("article");
        card.className = "card";

        const tagsHTML = (book.tags || []).map(tag => `
          <button class="tag ${currentTag === tag ? "active-tag" : ""}" data-tag="${escapeHTML(tag)}">${escapeHTML(tag)}</button>
        `).join("");

        card.innerHTML = `
          <div class="cover-wrap">
            <span class="status-badge">${escapeHTML(book.status)}</span>
            <img src="${escapeHTML(book.cover)}" alt="${escapeHTML(book.title)}" />
          </div>
          <div class="card-content">
            <h3 class="book-title">${escapeHTML(book.title)}</h3>
            <div class="tags">${tagsHTML}</div>
            <div class="links">
              <button class="annotation-btn" type="button">Аннотация</button>
              <a href="${escapeHTML(book.read)}" target="_blank">Читать</a>
            </div>
          </div>
        `;

        card.querySelectorAll(".tag").forEach(button => {
          button.addEventListener("click", () => {
            applyFilter("tag", button.dataset.tag);
            window.scrollTo({ top: 0, behavior: "smooth" });
          });
        });

        card.querySelector(".annotation-btn").addEventListener("click", () => openAnnotation(book));

        card.querySelector(".links a:last-child").addEventListener("click", () => saveToHistory(book.title));

        bookGrid.appendChild(card);
      });
    }

    homeButton.addEventListener("click", clearAllFilters);

    openMenuButtons.forEach(button => {
      button.addEventListener("click", () => openFilterSheet(button.dataset.menu));
    });

    searchInput.addEventListener("input", renderBooks);

    document.getElementById("clearHistory").addEventListener("click", () => {
      localStorage.removeItem("bookHistory");
      renderHistory();
    });

    filterBackdrop.addEventListener("click", (event) => {
      if (event.target === filterBackdrop) closeFilterSheet();
    });

    annotationBackdrop.addEventListener("click", (event) => {
      if (event.target === annotationBackdrop) closeAnnotation();
    });

    annotationClose.addEventListener("click", closeAnnotation);

    sheetResetBtn.addEventListener("click", () => {
      tempValue = null;
      renderSheetOptions();
    });

    sheetConfirmBtn.addEventListener("click", () => {
      applyFilter(tempMenuType, tempValue);
      closeFilterSheet();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    updateTopMenuActive();
    renderHistory();
    renderBooks();

  </script>
</body>
</html>
